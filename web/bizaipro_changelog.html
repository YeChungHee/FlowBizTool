    <link rel="stylesheet" href="./bizaipro_shared.css" />
    <style>
      /* ── Timeline layout ─────────────────────────────────────────────── */
      .timeline { display: flex; flex-direction: column; }

      .timeline-entry {
        display: grid;
        grid-template-columns: 170px 1fr;
        gap: 0 2rem;
        position: relative;
      }

      /* Left: version label column */
      .tl-meta {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        padding-top: 1.2rem;
        padding-right: 1.4rem;
        border-right: 2px solid var(--border);
        position: relative;
        gap: 0.25rem;
      }
      .tl-meta::after {
        content: '';
        position: absolute;
        right: -7px;
        top: 1.55rem;
        width: 12px; height: 12px;
        border-radius: 50%;
        background: var(--accent);
        border: 2px solid var(--surface);
        box-shadow: 0 0 0 2px var(--accent);
      }
      .tl-entry-planned .tl-meta::after { background: var(--muted); box-shadow: 0 0 0 2px var(--muted); opacity: 0.4; }
      .tl-entry-dim .tl-meta::after { background: #94a3b8; box-shadow: 0 0 0 2px #94a3b8; }

      .tl-version {
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        color: var(--accent);
        font-family: monospace;
        background: color-mix(in srgb, var(--accent) 10%, transparent);
        border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent);
        border-radius: 4px;
        padding: 2px 7px;
        text-align: right;
      }
      .tl-entry-dim .tl-version { color: #64748b; background: #f1f5f9; border-color: #cbd5e1; }
      .tl-entry-planned .tl-version { color: var(--muted); background: var(--bg); border-color: var(--border); }

      .tl-date { font-size: 0.7rem; color: var(--muted); text-align: right; }
      .tl-spec { font-size: 0.66rem; color: var(--muted); font-family: monospace; opacity: 0.6; text-align: right; }

      /* Right: body */
      .tl-body { padding: 1.2rem 0 2.2rem 0; }
      .tl-title { font-size: 1rem; font-weight: 700; color: var(--text); margin: 0 0 0.3rem 0; }
      .tl-entry-dim .tl-title { color: #475569; }
      .tl-entry-planned .tl-title { color: var(--muted); }
      .tl-subtitle { font-size: 0.8rem; color: var(--muted); margin: 0 0 0.9rem 0; line-height: 1.4; }

      .tl-latest-badge {
        display: inline-block;
        font-size: 0.64rem; font-weight: 700;
        background: var(--accent); color: #fff;
        padding: 2px 7px; border-radius: 3px;
        margin-left: 0.5rem; vertical-align: middle;
      }

      /* Change groups */
      .change-group { margin-bottom: 0.75rem; }
      .change-category {
        display: inline-block;
        font-size: 0.67rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
        padding: 1px 7px; border-radius: 3px; margin-bottom: 0.35rem;
      }
      .cat-new     { background: #d1fae5; color: #065f46; }
      .cat-fix     { background: #fee2e2; color: #991b1b; }
      .cat-improve { background: #dbeafe; color: #1e40af; }
      .cat-engine  { background: #fef3c7; color: #92400e; }
      .cat-infra   { background: #f3f4f6; color: #374151; }

      .change-items { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.22rem; }
      .change-items li {
        font-size: 0.8rem; color: var(--text); padding-left: 1rem; position: relative; line-height: 1.5;
      }
      .change-items li::before { content: '·'; position: absolute; left: 0; color: var(--accent); font-weight: 700; }

      /* Stats row */
      .stats-row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.8rem; }
      .stat-chip {
        font-size: 0.73rem;
        background: var(--bg); border: 1px solid var(--border);
        border-radius: 6px; padding: 3px 10px; color: var(--muted);
      }
      .stat-chip strong { color: var(--text); }

      /* Section divider */
      .tl-section-label {
        font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--muted); padding: 1rem 0 0.5rem 0;
        border-bottom: 1px solid var(--border); margin-bottom: 0.5rem;
      }

      @media (max-width: 640px) {
        .timeline-entry { grid-template-columns: 1fr; }
        .tl-meta {
          flex-direction: row; align-items: center; gap: 0.5rem;
          border-right: none; border-bottom: 2px solid var(--border);
          padding-right: 0; padding-bottom: 0.5rem;
        }
        .tl-meta::after { display: none; }
        .tl-body { padding-top: 0.7rem; }
      }
    </style>
  </head>

      const catClass = { new: "cat-new", fix: "cat-fix", improve: "cat-improve", engine: "cat-engine", infra: "cat-infra" };

      function renderEntry(entry) {
        const specBadge = entry.spec ? `<div class="tl-spec">${entry.spec}</div>` : '';
        const latestBadge = entry.latest ? `<span class="tl-latest-badge">LATEST</span>` : '';
        const statsHtml = (entry.stats || []).length
          ? `<div class="stats-row">${entry.stats.map(s =>
              `<div class="stat-chip"><strong>${s.value}</strong> ${s.label}</div>`).join('')}</div>`
          : '';
        const groupsHtml = (entry.groups || []).map(g => `
          <div class="change-group">
            <div class="change-category ${catClass[g.cat] || 'cat-infra'}">${g.label}</div>
            <ul class="change-items">${g.items.map(i => `<li>${i}</li>`).join('')}</ul>
          </div>`).join('');

        const cls = entry.planned ? 'tl-entry-planned' : entry.dim ? 'tl-entry-dim' : '';
        return `
          <div class="timeline-entry ${cls}">
            <div class="tl-meta">
              <div class="tl-version">${entry.version}</div>
              <div class="tl-date">${entry.date}</div>
              ${specBadge}
            </div>
            <div class="tl-body">

              <div class="tl-subtitle">${entry.subtitle}</div>

              ${statsHtml}
            </div>
